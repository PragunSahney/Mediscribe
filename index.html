<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScribe | 100% Free Prototype v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-teal-700 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-leaf mr-2"></i>MedScribe <span class="text-teal-200 text-sm font-light">$0 COST PROTOTYPE</span></h1>
        
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-key text-sm"></i>
            <input type="password" id="api-key" placeholder="Paste Gemini Free API Key" class="text-black text-sm px-2 py-1 rounded outline-none w-64 border border-teal-500">
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-5xl mt-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-teal-800">1. Free Web Speech Dictation</h2>
                    <select id="language-select" class="text-sm p-1 border rounded outline-teal-500">
                        <option value="en-IN">English (India) / Hinglish</option>
                        <option value="hi-IN">Hindi</option>
                    </select>
                </div>
                
                <button id="record-btn" class="w-full h-24 border-2 border-dashed border-teal-300 bg-teal-50 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-teal-100 transition-all">
                    <i id="mic-icon" class="fa-solid fa-microphone text-3xl text-teal-600"></i>
                    <p class="mt-2 text-sm text-teal-800 font-medium" id="mic-text">Click to Start Listening (Browser Native)</p>
                </button>
                
                <h3 class="text-sm font-semibold mt-6 mb-2 text-slate-600">Live Transcript:</h3>
                <textarea id="transcript-output" rows="5" class="w-full p-3 text-sm border rounded-lg bg-slate-50 focus:outline-teal-500" placeholder="Start speaking... text will appear here live."></textarea>
                
                <button onclick="generateWithGemini()" id="gen-btn" class="w-full mt-4 bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow-md flex justify-center items-center transition-colors">
                    <span id="btn-text">Generate Notes (Free Gemini)</span>
                    <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>

                <div id="error-box" class="hidden mt-4 p-3 bg-red-100 border border-red-400 text-red-700 text-sm rounded"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 text-teal-800">2. AI Output</h2>
                
                <div id="output-area" class="space-y-6 hidden">
                    <div class="p-4 bg-teal-50 rounded-lg border border-teal-100">
                        <h3 class="font-bold text-teal-800 border-b border-teal-200 pb-2 mb-2">SOAP Note</h3>
                        <p class="text-sm mb-1"><strong>S:</strong> <span id="soap-s"></span></p>
                        <p class="text-sm mb-1"><strong>O:</strong> <span id="soap-o"></span></p>
                        <p class="text-sm mb-1"><strong>A:</strong> <span id="soap-a"></span></p>
                        <p class="text-sm"><strong>P:</strong> <span id="soap-p"></span></p>
                    </div>

                    <div class="p-4 border rounded-lg border-slate-200">
                        <h3 class="font-bold border-b pb-2 mb-3 text-slate-800">Rx - Prescription</h3>
                        <div id="rx-list" class="space-y-3"></div>
                    </div>
                </div>
                
                <p id="status-msg" class="text-center text-slate-400 mt-10">Use Chrome browser for best results.</p>
            </div>
        </div>
    </main>

    <script>
        // --- 1. FREE BROWSER SPEECH TO TEXT ---
        let recognition;
        let isRecording = false;
        let finalTranscript = '';

        const recordBtn = document.getElementById('record-btn');
        const micIcon = document.getElementById('mic-icon');
        const micText = document.getElementById('mic-text');
        const transcriptOutput = document.getElementById('transcript-output');
        const langSelect = document.getElementById('language-select');

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = function() {
                isRecording = true;
                micIcon.classList.add('animate-pulse', 'text-red-500');
                micIcon.classList.remove('text-teal-600');
                micText.innerText = "Listening live... Click to Stop";
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptOutput.value = finalTranscript + interimTranscript;
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                if(event.error === 'not-allowed') alert("Please allow microphone permissions in your browser.");
            };

            recognition.onend = function() {
                isRecording = false;
                micIcon.classList.remove('animate-pulse', 'text-red-500');
                micIcon.classList.add('text-teal-600');
                micText.innerText = "Click to Start Listening (Browser Native)";
            };
        } else {
            alert("Speech Recognition API not supported in this browser. Please use Google Chrome.");
            recordBtn.disabled = true;
        }

        recordBtn.onclick = () => {
            if (!isRecording) {
                recognition.lang = langSelect.value;
                recognition.start();
            } else {
                recognition.stop();
            }
        };

        // --- 2. FREE GEMINI AI GENERATION ---
        async function generateWithGemini() {
            const errorBox = document.getElementById('error-box');
            errorBox.classList.add('hidden'); // Hide previous errors
            
            // Trim whitespace/hidden characters from API key
            const apiKey = document.getElementById('api-key').value.trim(); 
            const transcript = transcriptOutput.value.trim();
            
            if(!apiKey) {
                alert("Please paste your Google Gemini API Key at the top!");
                return;
            }
            if(!transcript) {
                alert("Please record some audio or type a transcript first.");
                return;
            }

            document.getElementById('btn-text').innerText = "Analyzing Clinically...";
            document.getElementById('btn-spinner').classList.remove('hidden');
            document.getElementById('gen-btn').disabled = true;
            
            const systemPrompt = `You are an expert Indian Clinical Scribe. Read the transcript (which may be in English, Hindi, or Hinglish). 
            Extract the medical data and return ONLY RAW JSON.
            Rules:
            1. Use standard Indian brand names (e.g., Dolo 650, Augmentin 625, Pan D) based on symptoms.
            2. Use standard Indian dosing formats (e.g., 1-0-1, SOS).
            3. Infer durations (e.g., 3 days) if implied.
            
            DO NOT output any markdown (no \`\`\`json). DO NOT output conversational text. Output ONLY this exact JSON structure:
            {
                "soap": {
                    "subjective": "...",
                    "objective": "...",
                    "assessment": "...",
                    "plan": "..."
                },
                "prescription": [
                    { "medicine": "...", "dosage": "...", "duration": "...", "instructions": "..." }
                ]
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt + "\n\nTranscript:\n" + transcript }]
                        }],
                        generationConfig: {
                            temperature: 0.1 // Keeps the AI strict and focused
                        }
                    })
                });

                const data = await response.json();
                
                // Check if Google's API returned an authentication/quota error
                if(data.error) {
                    throw new Error(`API Error: ${data.error.message}`);
                }

                // Get the text from Gemini
                let rawText = data.candidates[0].content.parts[0].text;
                
                // BULLETPROOF JSON EXTRACTOR
                // This finds the first { and the last } and ignores everything else.
                const startIndex = rawText.indexOf('{');
                const endIndex = rawText.lastIndexOf('}');
                
                if (startIndex === -1 || endIndex === -1) {
                    throw new Error("AI did not return a valid JSON structure. Please try again.");
                }
                
                let cleanJsonString = rawText.substring(startIndex, endIndex + 1);
                const result = JSON.parse(cleanJsonString);
                
                renderOutput(result);

            } catch (error) {
                console.error("Full Error Details:", error);
                errorBox.innerText = error.message;
                errorBox.classList.remove('hidden');
            } finally {
                document.getElementById('btn-text').innerText = "Generate Notes (Free Gemini)";
                document.getElementById('btn-spinner').classList.add('hidden');
                document.getElementById('gen-btn').disabled = false;
            }
        }

        // --- 3. RENDER OUTPUT ---
        function renderOutput(data) {
            document.getElementById('status-msg').classList.add('hidden');
            document.getElementById('output-area').classList.remove('hidden');

            // Populate SOAP Note, with fallbacks in case AI misses a field
            document.getElementById('soap-s').innerText = data.soap?.subjective || "N/A";
            document.getElementById('soap-o').innerText = data.soap?.objective || "N/A";
            document.getElementById('soap-a').innerText = data.soap?.assessment || "N/A";
            document.getElementById('soap-p').innerText = data.soap?.plan || "N/A";

            // Populate Prescription
            const rxList = document.getElementById('rx-list');
            rxList.innerHTML = ""; 
            
            if(data.prescription && Array.isArray(data.prescription) && data.prescription.length > 0) {
                data.prescription.forEach((med, index) => {
                    rxList.innerHTML += `
                        <div class="mb-3">
                            <p class="font-medium text-slate-800">${index + 1}. ${med.medicine || "Unknown Medicine"}</p>
                            <p class="text-sm text-slate-600 ml-4">Sig: ${med.dosage || "-"} | ${med.duration || "-"}</p>
                            <p class="text-xs text-slate-500 ml-4 italic">Note: ${med.instructions || "Use as directed"}</p>
                        </div>
                    `;
                });
            } else {
                rxList.innerHTML = "<p class='text-sm text-slate-500'>No medications prescribed.</p>";
            }
        }
    </script>
</body>
</html>
