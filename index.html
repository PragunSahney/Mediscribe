<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScribe | Premium AI Clinical Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1e3a8a', // Deep Navy
                        secondary: '#4f46e5', // Soft Indigo
                        surface: '#ffffff',
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth fade-in animation for the output */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        textarea { resize: none; }
    </style>
</head>
<body class="bg-background font-sans text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-surface border-b border-slate-200 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-50 p-2 rounded-lg text-secondary">
                <i class="fa-solid fa-stethoscope text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">MedScribe <span class="text-xs font-medium bg-indigo-100 text-secondary px-2 py-0.5 rounded-full ml-2">PROTOTYPE</span></h1>
        </div>
        
        <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-full px-4 py-1.5 focus-within:border-secondary focus-within:ring-2 focus-within:ring-indigo-100 transition-all shadow-inner">
            <i class="fa-solid fa-key text-slate-400 text-sm"></i>
            <input type="password" id="api-key" placeholder="Paste Gemini API Key" class="bg-transparent text-sm text-slate-700 outline-none w-56 placeholder-slate-400">
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-6xl flex-grow flex flex-col justify-center">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-lg font-semibold text-slate-800">Clinical Dictation</h2>
                        <p class="text-sm text-slate-500 mt-1">Speak naturally. The AI will structure your notes.</p>
                    </div>
                    <select id="language-select" class="text-sm bg-white border border-slate-200 text-slate-600 rounded-lg px-3 py-1.5 outline-none focus:border-secondary shadow-sm">
                        <option value="en-IN">English / Hinglish</option>
                        <option value="hi-IN">Hindi</option>
                    </select>
                </div>
                
                <div class="relative bg-white border border-slate-200 rounded-2xl shadow-sm focus-within:border-secondary focus-within:ring-4 focus-within:ring-indigo-50 transition-all flex flex-col h-80">
                    <textarea id="transcript-output" class="w-full flex-grow p-5 text-slate-700 bg-transparent outline-none rounded-t-2xl leading-relaxed" placeholder="Doctor, begin dictation here..."></textarea>
                    
                    <div class="bg-slate-50 border-t border-slate-100 p-3 rounded-b-2xl flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <button id="record-btn" class="w-12 h-12 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-secondary hover:border-secondary hover:shadow-md transition-all flex items-center justify-center group" title="Toggle Microphone">
                                <i id="mic-icon" class="fa-solid fa-microphone text-lg group-hover:scale-110 transition-transform"></i>
                            </button>
                            <span id="mic-text" class="text-sm font-medium text-slate-500">Ready to record</span>
                        </div>
                        <button onclick="generateWithGemini()" id="gen-btn" class="bg-primary hover:bg-blue-900 text-white text-sm font-semibold px-6 py-2.5 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                            <span id="btn-text">Generate Notes</span>
                            <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                            <i id="btn-icon" class="fa-solid fa-wand-magic-sparkles"></i>
                        </button>
                    </div>
                </div>

                <div id="error-box" class="hidden p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg shadow-sm"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl shadow-xl shadow-slate-200/40 flex flex-col overflow-hidden h-full min-h-[500px]">
                <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-slate-800">Structured Medical Record</h2>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">AI Generated</span>
                </div>
                
                <div class="p-6 flex-grow overflow-y-auto">
                    <div id="status-msg" class="h-full flex flex-col items-center justify-center text-slate-400 space-y-4">
                        <i class="fa-solid fa-file-medical text-4xl text-slate-200"></i>
                        <p class="text-sm">Your structured SOAP note and prescription will appear here.</p>
                    </div>

                    <div id="output-area" class="space-y-8 hidden animate-fade-in">
                        
                        <div>
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-clipboard-user text-secondary"></i> Clinical Assessment (SOAP)</h3>
                            <div class="bg-slate-50 rounded-xl border border-slate-100 p-5 space-y-4">
                                <div><span class="font-bold text-slate-800 w-6 inline-block">S:</span> <span class="text-slate-600 text-sm" id="soap-s"></span></div>
                                <div class="w-full h-px bg-slate-200"></div>
                                <div><span class="font-bold text-slate-800 w-6 inline-block">O:</span> <span class="text-slate-600 text-sm" id="soap-o"></span></div>
                                <div class="w-full h-px bg-slate-200"></div>
                                <div><span class="font-bold text-slate-800 w-6 inline-block">A:</span> <span class="text-slate-600 text-sm" id="soap-a"></span></div>
                                <div class="w-full h-px bg-slate-200"></div>
                                <div><span class="font-bold text-slate-800 w-6 inline-block">P:</span> <span class="text-slate-600 text-sm" id="soap-p"></span></div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-pills text-secondary"></i> Prescription (Rx)</h3>
                            <div id="rx-list" class="space-y-3">
                                </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. BROWSER SPEECH TO TEXT ---
        let recognition;
        let isRecording = false;
        let finalTranscript = '';

        const recordBtn = document.getElementById('record-btn');
        const micIcon = document.getElementById('mic-icon');
        const micText = document.getElementById('mic-text');
        const transcriptOutput = document.getElementById('transcript-output');
        const langSelect = document.getElementById('language-select');

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = function() {
                isRecording = true;
                recordBtn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                recordBtn.classList.add('bg-red-50', 'text-red-500', 'border-red-200', 'animate-pulse');
                micText.innerText = "Listening...";
                micText.classList.add('text-red-500');
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptOutput.value = finalTranscript + interimTranscript;
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                if(event.error === 'not-allowed') alert("Please allow microphone permissions in the browser URL bar.");
            };

            recognition.onend = function() {
                isRecording = false;
                recordBtn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                recordBtn.classList.remove('bg-red-50', 'text-red-500', 'border-red-200', 'animate-pulse');
                micText.innerText = "Ready to record";
                micText.classList.remove('text-red-500');
            };
        } else {
            micText.innerText = "Mic not supported on this browser";
            recordBtn.disabled = true;
            recordBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        recordBtn.onclick = () => {
            if (!isRecording) {
                recognition.lang = langSelect.value;
                recognition.start();
            } else {
                recognition.stop();
            }
        };

        // --- 2. GEMINI AI GENERATION ---
        async function generateWithGemini() {
            const errorBox = document.getElementById('error-box');
            errorBox.classList.add('hidden');
            
            const apiKey = document.getElementById('api-key').value.trim(); 
            const transcript = transcriptOutput.value.trim();
            
            if(!apiKey) {
                errorBox.innerText = "Authentication required: Please paste your Gemini API Key in the top right.";
                errorBox.classList.remove('hidden');
                return;
            }
            if(!transcript) {
                errorBox.innerText = "Empty input: Please record or type a clinical dictation first.";
                errorBox.classList.remove('hidden');
                return;
            }

            // Update UI to Loading State
            document.getElementById('btn-text').innerText = "Analyzing...";
            document.getElementById('btn-spinner').classList.remove('hidden');
            document.getElementById('btn-icon').classList.add('hidden');
            document.getElementById('gen-btn').disabled = true;
            document.getElementById('gen-btn').classList.add('opacity-80', 'cursor-not-allowed');
            
            const systemPrompt = `You are an expert Indian Clinical Scribe. Read the transcript (which may be in English, Hindi, or Hinglish). 
            Extract the medical data and return ONLY RAW JSON.
            Rules:
            1. Use standard Indian brand names (e.g., Dolo 650, Augmentin 625, Pan D) based on symptoms.
            2. Use standard Indian dosing formats (e.g., 1-0-1, SOS).
            3. Infer durations (e.g., 3 days) if implied.
            
            DO NOT output any markdown. DO NOT output conversational text. Output ONLY this exact JSON structure:
            {
                "soap": {
                    "subjective": "...",
                    "objective": "...",
                    "assessment": "...",
                    "plan": "..."
                },
                "prescription": [
                    { "medicine": "...", "dosage": "...", "duration": "...", "instructions": "..." }
                ]
            }`;

            try {
                // Notice the fixed model name here: gemini-1.5-flash-latest
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt + "\n\nTranscript:\n" + transcript }]
                        }],
                        generationConfig: { temperature: 0.1 }
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(`Google API Error: ${data.error.message}`);
                }

                let rawText = data.candidates[0].content.parts[0].text;
                
                const startIndex = rawText.indexOf('{');
                const endIndex = rawText.lastIndexOf('}');
                
                if (startIndex === -1 || endIndex === -1) {
                    throw new Error("Data parsing failed. AI did not return a valid structure.");
                }
                
                let cleanJsonString = rawText.substring(startIndex, endIndex + 1);
                const result = JSON.parse(cleanJsonString);
                
                renderOutput(result);

            } catch (error) {
                console.error("Full Error Details:", error);
                errorBox.innerText = error.message;
                errorBox.classList.remove('hidden');
            } finally {
                // Restore UI State
                document.getElementById('btn-text').innerText = "Generate Notes";
                document.getElementById('btn-spinner').classList.add('hidden');
                document.getElementById('btn-icon').classList.remove('hidden');
                document.getElementById('gen-btn').disabled = false;
                document.getElementById('gen-btn').classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // --- 3. RENDER OUTPUT ---
        function renderOutput(data) {
            document.getElementById('status-msg').classList.add('hidden');
            const outputArea = document.getElementById('output-area');
            
            // Reset animation
            outputArea.classList.remove('animate-fade-in');
            void outputArea.offsetWidth; // trigger reflow
            outputArea.classList.add('animate-fade-in');
            outputArea.classList.remove('hidden');

            // Populate SOAP Note
            document.getElementById('soap-s').innerText = data.soap?.subjective || "Not specified";
            document.getElementById('soap-o').innerText = data.soap?.objective || "Not specified";
            document.getElementById('soap-a').innerText = data.soap?.assessment || "Not specified";
            document.getElementById('soap-p').innerText = data.soap?.plan || "Not specified";

            // Populate Prescription
            const rxList = document.getElementById('rx-list');
            rxList.innerHTML = ""; 
            
            if(data.prescription && Array.isArray(data.prescription) && data.prescription.length > 0) {
                data.prescription.forEach((med, index) => {
                    rxList.innerHTML += `
                        <div class="bg-white border border-slate-200 p-4 rounded-xl flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex items-start gap-4">
                                <div class="bg-indigo-50 text-secondary font-bold w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0">
                                    ${index + 1}
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-base">${med.medicine || "Unknown"}</h4>
                                    <p class="text-sm text-slate-500 mt-0.5"><i class="fa-regular fa-clock mr-1 text-slate-400"></i> ${med.dosage || "-"} &nbsp;&bull;&nbsp; ${med.duration || "-"}</p>
                                    <p class="text-xs text-slate-400 mt-1 italic">${med.instructions || "Use as directed"}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                rxList.innerHTML = `
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center text-slate-500 text-sm">
                        No medications prescribed in this session.
                    </div>`;
            }
        }
    </script>
</body>
</html>
