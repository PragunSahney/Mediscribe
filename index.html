<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScribe | Premium AI Clinical Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' },
                        surface: '#ffffff', background: '#f8fafc', dark: '#0f172a'
                    },
                    boxShadow: { 'premium': '0 10px 40px -10px rgba(0,0,0,0.08)' }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        [contenteditable="true"] {
            transition: all 0.2s; border-radius: 4px; padding: 2px 6px; margin: -2px -6px; outline: none; border-bottom: 1px dashed #cbd5e1;
        }
        [contenteditable="true"]:hover { background-color: #f8fafc; cursor: text; border-bottom: 1px dashed #6366f1; }
        [contenteditable="true"]:focus { background-color: #ffffff; box-shadow: 0 0 0 2px #e0e7ff; border-bottom: 1px solid #6366f1; }
        [contenteditable="true"]:empty:before { content: attr(data-placeholder); color: #94a3b8; font-style: italic; }
        
        @media print { [contenteditable="true"] { border: none !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; } }
        textarea { resize: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased h-screen flex overflow-hidden print:bg-white print:h-auto">

    <aside class="w-72 bg-dark text-slate-300 flex flex-col flex-shrink-0 transition-all shadow-2xl z-20 print:hidden relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-64 bg-gradient-to-b from-brand-900/40 to-transparent pointer-events-none"></div>
        <div class="p-6 border-b border-slate-800 flex items-center justify-between relative z-10">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 p-2 rounded-xl text-white shadow-lg shadow-brand-500/30"><i class="fa-solid fa-stethoscope text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white leading-tight">MedScribe</h1>
                    <span class="text-[10px] font-bold tracking-widest text-brand-400 uppercase">Pro EMR</span>
                </div>
            </div>
        </div>
        <div class="p-5 relative z-10">
            <button onclick="startNewSession()" class="w-full bg-brand-600 hover:bg-brand-500 text-white text-sm font-semibold py-3 rounded-xl shadow-lg shadow-brand-600/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Patient
            </button>
        </div>
        <div class="flex-grow overflow-y-auto px-4 pb-4 space-y-2 relative z-10" id="history-list"></div>
        <div class="p-5 border-t border-slate-800 relative z-10">
            <button onclick="exportToCSV()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium py-2.5 rounded-lg transition-all flex items-center justify-center gap-2 border border-slate-700">
                <i class="fa-solid fa-file-excel text-green-500"></i> Export to Excel
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden print:h-auto print:block relative">
        <div id="save-toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-xs px-4 py-2 rounded-full shadow-lg opacity-0 transition-opacity duration-300 z-50 flex items-center gap-2 pointer-events-none">
            <i class="fa-solid fa-cloud-check text-green-400"></i> Auto-saved
        </div>

        <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200 px-8 py-4 flex justify-between items-center z-10 print:hidden">
            <h2 class="text-lg font-semibold text-slate-800">Workspace</h2>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-100 border border-slate-200 rounded-full px-4 py-2 focus-within:border-brand-500 focus-within:ring-2 focus-within:ring-brand-100 transition-all">
                    <i class="fa-solid fa-key text-slate-400 text-sm"></i>
                    <input type="password" id="api-key" placeholder="Gemini API Key" class="bg-transparent text-sm text-slate-700 outline-none w-48 placeholder-slate-400">
                </div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-indigo-400 text-white flex items-center justify-center font-bold text-sm shadow-md border-2 border-white">DR</div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 print:p-0 print:m-0 print:block">
            <div class="max-w-7xl mx-auto grid grid-cols-1 xl:grid-cols-12 gap-8 print:block">
                
                <div class="xl:col-span-4 flex flex-col gap-6 print:hidden">
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-premium">
                        <div class="flex justify-between items-center mb-5">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-user-injured text-brand-500"></i> Patient Details</h3>
                        </div>
                        <div class="grid grid-cols-12 gap-3 mb-4">
                            <div class="col-span-12">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Full Name</label>
                                <input type="text" id="patient-name" placeholder="e.g. Rahul Sharma" onblur="autoSaveContext()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 outline-none focus:border-brand-500 focus:bg-white transition-colors">
                            </div>
                            <div class="col-span-6">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Age</label>
                                <input type="number" id="patient-age" placeholder="Yrs" onblur="autoSaveContext()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 outline-none focus:border-brand-500 focus:bg-white transition-colors">
                            </div>
                            <div class="col-span-6">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Gender</label>
                                <select id="patient-gender" onchange="autoSaveContext()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-2 py-2 text-sm text-slate-800 outline-none focus:border-brand-500 focus:bg-white transition-colors">
                                    <option value="">-</option><option value="M">Male</option><option value="F">Female</option><option value="O">Other</option>
                                </select>
                            </div>
                        </div>

                        <button id="record-btn" class="w-full bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-200 font-semibold py-3 rounded-xl mb-3 transition-all flex items-center justify-center gap-2 relative overflow-hidden shadow-sm">
                            <i id="mic-icon" class="fa-solid fa-microphone z-10"></i> 
                            <span id="record-text" class="z-10">Start Dictation</span>
                            <div id="mic-pulse" class="absolute inset-0 bg-red-100 opacity-0 hidden"></div>
                        </button>

                        <div class="relative flex flex-col h-48 border border-slate-200 rounded-xl overflow-hidden focus-within:border-brand-500 transition-colors bg-slate-50 focus-within:bg-white shadow-inner">
                            <textarea id="transcript-output" onblur="autoSaveContext()" class="w-full flex-grow p-4 text-slate-700 bg-transparent outline-none text-sm leading-relaxed" placeholder="Transcript will appear here..."></textarea>
                            <div class="bg-white border-t border-slate-100 p-3 flex justify-end items-center">
                                <button onclick="generateWithGemini()" id="gen-btn" class="bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium px-6 py-2 rounded-lg shadow-md transition-all flex items-center gap-2">
                                    <span id="btn-text">Generate AI Note</span>
                                    <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div id="error-box" class="hidden p-4 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl shadow-sm"></div>
                </div>

                <div class="xl:col-span-8 print:w-full print:block">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-premium h-full min-h-[600px] flex flex-col print:border-none print:shadow-none print:min-h-0 relative overflow-hidden">
                        
                        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white z-10 print:border-b-2 print:border-slate-800">
                            <div>
                                <h2 class="text-xl font-bold text-slate-900">Medical Record</h2>
                                <p id="record-meta" class="text-sm text-slate-400 mt-0.5 print:text-black">Unsaved Session</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="bg-brand-50 text-brand-600 border border-brand-200 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide print:hidden"><i class="fa-solid fa-bolt mr-1"></i> Editable</span>
                                <div id="action-buttons" class="hidden flex items-center gap-2 print:hidden">
                                    <button onclick="window.print()" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors"><i class="fa-solid fa-print"></i></button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-8 flex-grow overflow-y-auto print:p-0 print:pt-6 relative bg-slate-50/30 print:bg-white">
                            <div id="status-msg" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 print:hidden">
                                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 border border-slate-100 shadow-sm"><i class="fa-regular fa-file-lines text-3xl text-slate-300"></i></div>
                                <p class="text-sm font-medium text-slate-500">Structured data will appear here.</p>
                            </div>

                            <div id="output-area" class="space-y-8 hidden print:block bg-white p-6 rounded-xl border border-slate-100 shadow-sm print:border-none print:shadow-none print:p-0">
                                
                                <div id="differential-section" class="bg-slate-50 p-5 rounded-xl border border-slate-200 print:hidden">
                                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b border-slate-200 pb-2"><i class="fa-solid fa-microscope text-indigo-500"></i> Differential Diagnosis AI</h3>
                                    <div id="diff-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"></div>
                                    
                                    <div class="bg-white p-4 rounded-lg border border-indigo-100 shadow-sm">
                                        <h4 class="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-2"><i class="fa-solid fa-user-md mr-1"></i> Suggested Line of Treatment (Indian Protocol)</h4>
                                        <p id="suggested-treatment" class="text-sm text-slate-700 leading-relaxed"></p>
                                    </div>
                                </div>

                                <div>
                                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b border-slate-200 pb-2 print:border-slate-800">
                                        <i class="fa-solid fa-stethoscope text-brand-500"></i> Clinical Assessment
                                    </h3>
                                    <div class="space-y-4">
                                        <div class="flex gap-4 group"><div class="font-bold text-brand-600 w-4 pt-0.5">S</div><div contenteditable="true" data-placeholder="Enter subjective notes..." class="text-slate-700 text-sm w-full leading-relaxed" id="soap-s" onblur="autoSaveData('soap', 'subjective', this.innerText)"></div></div>
                                        <div class="flex gap-4 group"><div class="font-bold text-brand-600 w-4 pt-0.5">O</div><div contenteditable="true" data-placeholder="Enter objective notes..." class="text-slate-700 text-sm w-full leading-relaxed" id="soap-o" onblur="autoSaveData('soap', 'objective', this.innerText)"></div></div>
                                        <div class="flex gap-4 group"><div class="font-bold text-brand-600 w-4 pt-0.5">A</div><div contenteditable="true" data-placeholder="Enter assessment..." class="text-slate-700 text-sm w-full leading-relaxed" id="soap-a" onblur="autoSaveData('soap', 'assessment', this.innerText)"></div></div>
                                        <div class="flex gap-4 group"><div class="font-bold text-brand-600 w-4 pt-0.5">P</div><div contenteditable="true" data-placeholder="Enter plan..." class="text-slate-700 text-sm w-full leading-relaxed" id="soap-p" onblur="autoSaveData('soap', 'plan', this.innerText)"></div></div>
                                    </div>
                                </div>

                                <div>
                                    <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-4 print:border-slate-800">
                                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                            <i class="fa-solid fa-pills text-brand-500"></i> Prescription (Rx)
                                        </h3>
                                        <button onclick="addMedicine()" class="text-xs bg-brand-50 text-brand-600 border border-brand-200 hover:bg-brand-100 px-3 py-1.5 rounded-md font-bold transition-colors print:hidden flex items-center shadow-sm">
                                            <i class="fa-solid fa-plus mr-1"></i> Add Med
                                        </button>
                                    </div>
                                    <div id="rx-list" class="space-y-2 print:space-y-0"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        let currentRecordId = null;
        let emrHistory = JSON.parse(localStorage.getItem('medscribe_history')) || [];
        let toastTimeout;

        window.onload = () => { renderHistoryList(); };

        // --- EXPORT, ADD/DEL MEDICINE LOGIC (unchanged) ---
        function addMedicine() {
            if(!currentRecordId) return alert("Please generate or load a patient record first.");
            const record = emrHistory.find(r => r.id === currentRecordId);
            if(record && record.data) {
                if(!record.data.prescription) record.data.prescription = [];
                record.data.prescription.push({ medicine: "", dosage: "", duration: "", instructions: "" });
                localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); renderOutputUI(record.data); showToast();
            }
        }
        function deleteMedicine(index) {
            if(!currentRecordId) return; if(!confirm("Remove this medication?")) return;
            const record = emrHistory.find(r => r.id === currentRecordId);
            if(record && record.data && record.data.prescription) {
                record.data.prescription.splice(index, 1); localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); renderOutputUI(record.data); showToast();
            }
        }
        function exportToCSV() {
            if(emrHistory.length === 0) return alert("No patient records to export.");
            let csvContent = "data:text/csv;charset=utf-8,Date,Patient Name,Age,Gender,Subjective,Objective,Assessment,Plan\n";
            emrHistory.forEach(r => {
                const s = r.data?.soap?.subjective || ""; const o = r.data?.soap?.objective || "";
                const a = r.data?.soap?.assessment || ""; const p = r.data?.soap?.plan || "";
                csvContent += `"${r.date}","${r.patientName}","${r.age||''}","${r.gender||''}","${s.replace(/"/g,'""')}","${o.replace(/"/g,'""')}","${a.replace(/"/g,'""')}","${p.replace(/"/g,'""')}"\r\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `MedScribe_Export_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // --- UPGRADED SPEECH RECOGNITION (FIXED SILENCE TIMEOUT) ---
        let recognition; 
        let isRecording = false; 
        let intentionalStop = true; // Tracks if the user actually clicked "Stop"
        let finalTranscript = '';
        
        const transcriptOutput = document.getElementById('transcript-output');
        const recordBtn = document.getElementById('record-btn');
        const micIcon = document.getElementById('mic-icon');
        const recordText = document.getElementById('record-text');
        const micPulse = document.getElementById('mic-pulse');

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition(); 
            recognition.continuous = true; 
            recognition.interimResults = true;
            recognition.lang = 'en-IN'; // Set to Indian English

            recognition.onstart = () => { 
                isRecording = true; 
                intentionalStop = false;
                
                // Update UI to clearly show it is recording
                recordBtn.classList.replace('bg-slate-100', 'bg-red-50');
                recordBtn.classList.replace('text-slate-700', 'text-red-600');
                recordBtn.classList.replace('border-slate-200', 'border-red-200');
                micIcon.classList.add('fa-beat-fade');
                recordText.innerText = "Recording... (Click to Stop)";
                micPulse.classList.remove('hidden'); 
                micPulse.classList.add('animate-ping'); 
            };
            
            recognition.onresult = (e) => {
                let interim = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) { 
                    if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' '; 
                    else interim += e.results[i][0].transcript; 
                }
                transcriptOutput.value = finalTranscript + interim;
            };
            
            recognition.onend = () => { 
                isRecording = false; 
                
                if (!intentionalStop) {
                    // browser auto-stopped due to silence, restart it instantly!
                    try { recognition.start(); } catch(e) { console.log("Restart error", e); }
                    return; // Skip UI reset
                }

                // Normal Stop UI reset
                recordBtn.classList.replace('bg-red-50', 'bg-slate-100');
                recordBtn.classList.replace('text-red-600', 'text-slate-700');
                recordBtn.classList.replace('border-red-200', 'border-slate-200');
                micIcon.classList.remove('fa-beat-fade');
                recordText.innerText = "Start Dictation";
                micPulse.classList.add('hidden'); 
                micPulse.classList.remove('animate-ping'); 
                autoSaveContext(); 
            };
        }

        recordBtn.onclick = () => { 
            if(!recognition) return alert("Microphone not supported in this browser."); 
            
            if(!isRecording) { 
                finalTranscript = transcriptOutput.value; // Keep existing text
                intentionalStop = false;
                recognition.start(); 
            } else { 
                intentionalStop = true; // Tell the auto-restarter to stand down
                recognition.stop(); 
            } 
        };

        // --- AUTO-SAVE LOGIC ---
        function showToast() {
            const toast = document.getElementById('save-toast'); toast.classList.remove('opacity-0'); toast.classList.add('opacity-100');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0'); }, 2000);
        }
        function autoSaveContext() {
            if(!currentRecordId) return;
            const record = emrHistory.find(r => r.id === currentRecordId);
            if(record) {
                record.patientName = document.getElementById('patient-name').value || "Unknown Patient";
                record.age = document.getElementById('patient-age').value; record.gender = document.getElementById('patient-gender').value;
                record.transcript = document.getElementById('transcript-output').value;
                localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); updateRecordMeta(record); renderHistoryList(); showToast();
            }
        }
        function autoSaveData(section, key, value) {
            if(!currentRecordId) return; const record = emrHistory.find(r => r.id === currentRecordId);
            if(record && record.data[section]) { record.data[section][key] = value; localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); showToast(); }
        }
        function autoSaveRx(index, key, value) {
            if(!currentRecordId) return; const record = emrHistory.find(r => r.id === currentRecordId);
            if(record && record.data.prescription[index]) { record.data.prescription[index][key] = value; localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); showToast(); }
        }
        function saveRecordToHistory(parsedData) {
            const newRecord = {
                id: Date.now().toString(), date: new Date().toLocaleString(),
                patientName: document.getElementById('patient-name').value || "Unknown Patient",
                age: document.getElementById('patient-age').value, gender: document.getElementById('patient-gender').value,
                transcript: transcriptOutput.value, data: parsedData
            };
            emrHistory.unshift(newRecord); localStorage.setItem('medscribe_history', JSON.stringify(emrHistory));
            currentRecordId = newRecord.id; renderHistoryList(); updateRecordMeta(newRecord);
        }
        function renderHistoryList() {
            const listContainer = document.getElementById('history-list'); listContainer.innerHTML = '';
            if(emrHistory.length === 0) { listContainer.innerHTML = '<div class="text-center text-xs text-slate-500 mt-10">No records found.</div>'; return; }
            emrHistory.forEach(record => {
                const isActive = record.id === currentRecordId;
                const activeClasses = isActive ? 'bg-slate-800 border-brand-500 text-white' : 'bg-slate-800/50 border-transparent text-slate-400 hover:bg-slate-800 hover:text-white';
                let details = []; if(record.age) details.push(`${record.age}y`); if(record.gender) details.push(record.gender);
                listContainer.insertAdjacentHTML('beforeend', `
                    <div onclick="loadRecord('${record.id}')" class="cursor-pointer border-l-2 rounded-r-xl p-3 transition-all ${activeClasses}">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-semibold text-sm truncate pr-2"><i class="fa-regular fa-user text-xs mr-1 opacity-50"></i> ${record.patientName} ${details.length>0 ? '('+details.join(', ')+')' : ''}</h4>
                            <button onclick="deleteRecord('${record.id}', event)" class="opacity-50 hover:opacity-100 hover:text-red-400"><i class="fa-solid fa-xmark text-xs"></i></button>
                        </div>
                        <p class="text-[10px] opacity-70">${record.date}</p>
                    </div>`);
            });
        }
        function loadRecord(id) {
            const record = emrHistory.find(r => r.id === id); if(!record) return;
            currentRecordId = id; finalTranscript = record.transcript; intentionalStop = true;
            if(recognition && isRecording) recognition.stop(); // Stop recording if switching patients
            
            document.getElementById('patient-name').value = record.patientName === "Unknown Patient" ? "" : record.patientName;
            document.getElementById('patient-age').value = record.age || ""; document.getElementById('patient-gender').value = record.gender || "";
            document.getElementById('transcript-output').value = record.transcript;
            renderHistoryList(); updateRecordMeta(record); renderOutputUI(record.data);
        }
        function deleteRecord(id, event) {
            event.stopPropagation(); if(!confirm("Delete this patient record?")) return;
            emrHistory = emrHistory.filter(r => r.id !== id); localStorage.setItem('medscribe_history', JSON.stringify(emrHistory));
            if(currentRecordId === id) startNewSession(); else renderHistoryList();
        }
        function startNewSession() {
            currentRecordId = null; finalTranscript = ''; intentionalStop = true;
            if(recognition && isRecording) recognition.stop();
            
            ['patient-name', 'patient-age', 'patient-gender', 'transcript-output'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('output-area').classList.add('hidden'); document.getElementById('status-msg').classList.remove('hidden'); document.getElementById('action-buttons').classList.add('hidden'); document.getElementById('record-meta').innerText = "Unsaved Session";
            renderHistoryList(); 
        }
        function updateRecordMeta(record) {
            let details = []; if(record.age) details.push(`${record.age} Yrs`); if(record.gender) details.push(record.gender === 'M' ? 'Male' : record.gender === 'F' ? 'Female' : 'Other');
            document.getElementById('record-meta').innerHTML = `<b>${record.patientName}</b>${details.length > 0 ? ' | '+details.join(', ') : ''} &nbsp;&bull;&nbsp; ${record.date}`;
        }

        // --- GEMINI AI GENERATION ---
        async function generateWithGemini() {
            document.getElementById('error-box').classList.add('hidden');
            const apiKey = document.getElementById('api-key').value.trim(); const transcript = transcriptOutput.value.trim();
            if(!apiKey) return showError("Paste your Gemini API Key top right."); if(!transcript) return showError("Record dictation first.");

            document.getElementById('btn-text').innerText = "Processing..."; document.getElementById('btn-spinner').classList.remove('hidden'); document.getElementById('gen-btn').disabled = true;
            
            // NEW PROMPT: Added Indian context and Suggested Treatment
            const systemPrompt = `You are a Medical AI Scribe and Clinical Decision Support System tailored for Indian clinical practice.
            Extract SOAP notes and Rx. Analyze symptoms and generate up to 3 Differential Diagnoses.
            Also provide a Suggested Line of Treatment, mentioning common Indian medicine brand names (e.g., Dolo 650, Pan-D, Monocef, Augmentin) and standard Indian clinical protocols where applicable.
            Return ONLY RAW JSON in this format:
            {
                "differentials": [ { "condition": "...", "probability": "number 1-100", "reasoning": "..." } ],
                "suggestedTreatment": "...",
                "soap": { "subjective": "...", "objective": "...", "assessment": "...", "plan": "..." },
                "prescription": [ { "medicine": "...", "dosage": "...", "duration": "...", "instructions": "..." } ]
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt + "\n\nTranscript:\n" + transcript }] }], generationConfig: { temperature: 0.1 } })
                });
                const data = await response.json(); if(data.error) throw new Error(data.error.message);
                
                let rawText = data.candidates[0].content.parts[0].text;
                let parsedData = JSON.parse(rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1));

                if(!currentRecordId) saveRecordToHistory(parsedData);
                else { const record = emrHistory.find(r => r.id === currentRecordId); record.data = parsedData; localStorage.setItem('medscribe_history', JSON.stringify(emrHistory)); }
                renderOutputUI(emrHistory.find(r => r.id === currentRecordId).data);

            } catch (error) { showError(error.message); } 
            finally { document.getElementById('btn-text').innerText = "Generate AI Note"; document.getElementById('btn-spinner').classList.add('hidden'); document.getElementById('gen-btn').disabled = false; }
        }

        function showError(msg) { document.getElementById('error-box').innerText = msg; document.getElementById('error-box').classList.remove('hidden'); }

        // --- RENDER OUTPUT UI ---
        function renderOutputUI(data) {
            document.getElementById('status-msg').classList.add('hidden');
            const outputArea = document.getElementById('output-area');
            outputArea.classList.remove('animate-fade-in'); void outputArea.offsetWidth; 
            outputArea.classList.add('animate-fade-in'); outputArea.classList.remove('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');

            const diffSection = document.getElementById('differential-section'); 
            const diffList = document.getElementById('diff-list'); 
            const treatmentText = document.getElementById('suggested-treatment');
            diffList.innerHTML = "";
            
            if(data.differentials && data.differentials.length > 0) {
                diffSection.classList.remove('hidden');
                data.differentials.forEach(diff => {
                    const prob = parseInt(diff.probability) || 0; let colorClass = prob > 70 ? 'bg-red-500' : prob > 40 ? 'bg-amber-500' : 'bg-green-500';
                    diffList.innerHTML += `<div class="bg-white p-3 rounded-lg border border-slate-100 shadow-sm"><div class="flex justify-between items-center mb-1"><span class="font-bold text-slate-800 text-sm">${diff.condition}</span><span class="text-xs font-bold text-slate-500">${prob}%</span></div><div class="w-full bg-slate-100 rounded-full h-1.5 mb-2"><div class="${colorClass} h-1.5 rounded-full" style="width: ${prob}%"></div></div><p class="text-[11px] text-slate-500 leading-snug">${diff.reasoning}</p></div>`;
                });
                
                // NEW: Render Suggested Treatment
                treatmentText.innerText = data.suggestedTreatment || "No specific treatment line suggested. Please review symptoms.";
            } else diffSection.classList.add('hidden');

            ['subjective', 'objective', 'assessment', 'plan'].forEach(key => document.getElementById(`soap-${key.charAt(0)}`).innerText = data.soap?.[key] || "");

            const rxList = document.getElementById('rx-list'); rxList.innerHTML = ""; 
            if(data.prescription && data.prescription.length > 0) {
                data.prescription.forEach((med, index) => {
                    rxList.innerHTML += `
                        <div class="group relative p-4 bg-slate-50 rounded-lg border border-slate-100 flex items-start gap-4 transition-colors hover:bg-slate-100 print:bg-transparent print:border-b print:border-slate-300 print:rounded-none print:p-2">
                            <div class="font-bold text-slate-400 text-lg w-6 pt-1 print:text-slate-800">${index + 1}.</div>
                            <div class="flex-grow">
                                <h4 class="font-bold text-slate-800 text-base" contenteditable="true" data-placeholder="Medicine Name (Click to edit)" onblur="autoSaveRx(${index}, 'medicine', this.innerText)">${med.medicine || ""}</h4>
                                <div class="text-sm text-slate-600 mt-2 flex gap-4 print:text-black">
                                    <span class="flex items-center"><i class="fa-solid fa-cubes-stacked text-slate-300 mr-2 text-xs print:hidden"></i> <span contenteditable="true" data-placeholder="Dosage" onblur="autoSaveRx(${index}, 'dosage', this.innerText)">${med.dosage || ""}</span></span>
                                    <span class="flex items-center"><i class="fa-regular fa-calendar text-slate-300 mr-2 text-xs print:hidden"></i> <span contenteditable="true" data-placeholder="Duration" onblur="autoSaveRx(${index}, 'duration', this.innerText)">${med.duration || ""}</span></span>
                                </div>
                                <p class="text-xs text-brand-600 mt-3 flex items-start print:text-slate-600"><i class="fa-solid fa-info-circle mr-1.5 mt-0.5 opacity-50 print:hidden"></i> <span contenteditable="true" data-placeholder="Instructions" class="italic flex-grow" onblur="autoSaveRx(${index}, 'instructions', this.innerText)">${med.instructions || ""}</span></p>
                            </div>
                            <button onclick="deleteMedicine(${index})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity print:hidden" title="Remove medication"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `;
                });
            } else { rxList.innerHTML = `<div class="p-4 text-slate-500 text-sm italic">No medications. Click "Add Med" to prescribe.</div>`; }
        }
    </script>
</body>
</html>
